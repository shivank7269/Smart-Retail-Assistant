name: Smart Retail Assistant — CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: smart-retail-assistant
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}       # e.g. myregistry.azurecr.io
  AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}     # e.g. smart-retail-assistant
  RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}     # e.g. rg-smart-retail

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Test
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Run Pytest Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Inject dummy env vars so imports don't fail during test collection
      - name: Create test .env
        run: |
          cat > .env <<EOF
          MONGO_URL=mongodb://localhost:27017/
          DATABASE_NAME=retail_database
          AZURE_OPENAI_ENDPOINT=https://placeholder.openai.azure.com/
          AZURE_OPENAI_KEY=placeholder
          AZURE_OPENAI_DEPLOYMENT=gpt-4o
          AZURE_EMBEDDING_DEPLOYMENT=text-embedding-ada-002
          EOF

      - name: Run tests
        run: pytest backend/tests/ -v --tb=short

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build & Push Docker image to Azure Container Registry
  # Only runs on push to main/master (not on PRs)
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Generate image metadata (tag = short SHA)
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "full_image=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ steps.meta.outputs.full_image }} \
            --tag ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push Docker image to ACR
        run: |
          docker push ${{ steps.meta.outputs.full_image }}
          docker push ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy to Azure Web App (Container)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure Web App
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    environment: production

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy container to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          resource-group-name: ${{ env.RESOURCE_GROUP }}
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}

      - name: Set App Settings (env vars from GitHub Secrets)
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          app-settings-json: |
            [
              { "name": "MONGO_URL",                    "value": "${{ secrets.MONGO_URL }}" },
              { "name": "DATABASE_NAME",                "value": "${{ secrets.DATABASE_NAME }}" },
              { "name": "AZURE_OPENAI_ENDPOINT",        "value": "${{ secrets.AZURE_OPENAI_ENDPOINT }}" },
              { "name": "AZURE_OPENAI_KEY",             "value": "${{ secrets.AZURE_OPENAI_KEY }}" },
              { "name": "AZURE_OPENAI_DEPLOYMENT",      "value": "${{ secrets.AZURE_OPENAI_DEPLOYMENT }}" },
              { "name": "AZURE_EMBEDDING_DEPLOYMENT",   "value": "${{ secrets.AZURE_EMBEDDING_DEPLOYMENT }}" },
              { "name": "WEBSITES_PORT",                "value": "8000" }
            ]

      - name: Health check post-deploy
        run: |
          echo "Waiting 30s for app to start..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed with HTTP $STATUS"
            exit 1
          fi
          echo "✅ Deployment successful"