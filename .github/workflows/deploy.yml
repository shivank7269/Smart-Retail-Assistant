name: Smart Retail Assistant — CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # Allows you to trigger the pipeline manually from GitHub

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: smart-retail-assistant
  ACR_LOGIN_SERVER: smartretailsacr.azurecr.io
  AZURE_WEBAPP_NAME: smart-retail-assistant-7269
  RESOURCE_GROUP: rg-smart-retail

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Test
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Run Pytest Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          MONGO_URL: ${{ secrets.MONGO_URL }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_EMBEDDING_DEPLOYMENT: ${{ secrets.AZURE_EMBEDDING_DEPLOYMENT }}
        # Run pytest as a module to correctly resolve the backend folder
        run: python -m pytest backend/tests/ -v --tb=short

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Build & Push Docker image to Azure Container Registry
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: smartretailsacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Generate image metadata (tag = short SHA)
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "full_image=smartretailsacr.azurecr.io/${{ env.IMAGE_NAME }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ steps.meta.outputs.full_image }} \
            --tag smartretailsacr.azurecr.io/${{ env.IMAGE_NAME }}:latest \
            .

      - name: Push Docker image to ACR
        run: |
          docker push ${{ steps.meta.outputs.full_image }}
          docker push smartretailsacr.azurecr.io/${{ env.IMAGE_NAME }}:latest

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy to Azure Web App (Container)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure Web App
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment: production

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy container to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: smart-retail-assistant-7269
          resource-group-name: rg-smart-retail
          images: smartretailsacr.azurecr.io/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}

      - name: Set App Settings (env vars from GitHub Secrets)
        uses: azure/appservice-settings@v1
        with:
          app-name: smart-retail-assistant-7269
          app-settings-json: |
            [
              { "name": "MONGO_URL",                       "value": "${{ secrets.MONGO_URL }}" },
              { "name": "DATABASE_NAME",                   "value": "${{ secrets.DATABASE_NAME }}" },
              { "name": "AZURE_OPENAI_ENDPOINT",           "value": "${{ secrets.AZURE_OPENAI_ENDPOINT }}" },
              { "name": "AZURE_OPENAI_API_KEY",            "value": "${{ secrets.AZURE_OPENAI_KEY }}" },
              { "name": "AZURE_OPENAI_DEPLOYMENT",         "value": "${{ secrets.AZURE_OPENAI_DEPLOYMENT }}" },
              { "name": "AZURE_EMBEDDING_DEPLOYMENT",      "value": "${{ secrets.AZURE_EMBEDDING_DEPLOYMENT }}" },
              { "name": "WEBSITES_PORT",                   "value": "8000" },
              { "name": "DOCKER_REGISTRY_SERVER_URL",      "value": "https://smartretailsacr.azurecr.io" },
              { "name": "DOCKER_REGISTRY_SERVER_USERNAME", "value": "smartretailsacr" },
              { "name": "DOCKER_REGISTRY_SERVER_PASSWORD", "value": "${{ secrets.ACR_PASSWORD }}" }
            ]

      - name: Health check post-deploy
        run: |
          echo "Waiting 60s for app to start..."
          sleep 60
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://smart-retail-assistant-7269.azurewebsites.net/health)
          echo "Health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed with HTTP $STATUS"
            exit 1
          fi
          echo "✅ Deployment successful"